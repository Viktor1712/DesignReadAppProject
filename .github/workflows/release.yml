name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para crear releases

    steps:
      # -------- 1. Setup --------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para changelog

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "Building version: $VERSION (code: ${{ github.run_number }})"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # -------- 2. Firma --------
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore
          echo "Keystore decoded successfully"

      # -------- 3. Build --------
      - name: Build Release APK & AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      # -------- 4. Rename artifacts (nombre legible) --------
      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             artifacts/app-v${{ env.VERSION_NAME }}.apk
          cp app/build/outputs/bundle/release/app-release.aab \
             artifacts/app-v${{ env.VERSION_NAME }}.aab

      # -------- 5. Cleanup keystore (seguridad) --------
      - name: Remove keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore

      # -------- 6. GitHub Release --------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/app-v${{ env.VERSION_NAME }}.apk
            artifacts/app-v${{ env.VERSION_NAME }}.aab
          body: |
            ## 📱 Descarga
            
            - **APK** (instalación directa): `app-v${{ env.VERSION_NAME }}.apk`
            - **AAB** (Google Play): `app-v${{ env.VERSION_NAME }}.aab`
            
            ## 📝 Cambios
            
            Ver changelog autogenerado más abajo.
          generate_release_notes: true
          draft: true  # ← cambiá a false cuando confíes en el pipeline
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}