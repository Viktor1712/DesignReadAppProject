name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore
          ls -la ${{ github.workspace }}/release.keystore

      - name: Build Release APK & AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: List all outputs (DEBUG)
        if: always()
        run: |
          echo "=== APK files ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs"
          echo ""
          echo "=== AAB files ==="
          find app/build/outputs -name "*.aab" 2>/dev/null || echo "No AABs"

      - name: Rename artifacts (tolerante)
        run: |
          mkdir -p artifacts
          
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          
          if [ -z "$APK" ]; then
            echo "❌ No se encontró APK. Listing completo:"
            find app/build -type f
            exit 1
          fi
          
          cp "$APK" "artifacts/app-v${{ env.VERSION_NAME }}.apk"
          
          if [ -n "$AAB" ]; then
            cp "$AAB" "artifacts/app-v${{ env.VERSION_NAME }}.aab"
          fi
          
          ls -la artifacts/

      - name: Remove keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/app-v${{ env.VERSION_NAME }}.apk
            artifacts/app-v${{ env.VERSION_NAME }}.aab
          generate_release_notes: true
          draft: true
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}